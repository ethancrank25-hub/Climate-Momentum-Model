version: 2.1
jobs:
  data-prep:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Data Prep
          command: |
            echo "Running data prep..."
            sleep 5
            echo "Data prep complete"

  forecasting:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Forecasting
          command: |
            echo "Running forecasting..."
            sleep 5
            echo "Forecasting complete"

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Deploy
          command: |
            echo "Deploying application..."
            sleep 3
            echo "Deploy complete"

workflows:
  data-prep-pipeline:
    jobs:
      - data-prep

  forecasting-pipeline:
    jobs:
      - forecasting

  deploy-pipeline:
    jobs:
      - deploy

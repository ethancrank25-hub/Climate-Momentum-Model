version: 2.1
jobs:
  data-prep:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout

      - run:
          name: Install dependencies (if needed)
          command: |
            echo "Installing base dependencies..."
            sudo apt-get update || true

      - run:
          name: Plan a deploy
          command: |
            circleci run release plan \
              --environment-name="Development" \
              --component-name="Main Data Pipeline" \
              --target-version="v1.0.0"

      - run:
          name: Run Data Prep Pipeline (actual deployment work)
          command: |
            echo "Running data prep..."
            # Replace this with your real script, e.g.:
            # python scripts/data_prep.py
            # or npm run data-prep
            sleep 5
            echo "Data prep complete"

      - run:
          name: Mark deployment SUCCESS
          command: |
            output=$(circleci run release update --status=SUCCESS 2>&1) && echo "$output" || {
              echo "$output"
              echo "$output" | grep -q "already completed" || exit 1
            }
          when: on_success

      - run:
          name: Mark deployment FAILED
          command: |
            output=$(circleci run release update --status=FAILED 2>&1) && echo "$output" || {
              echo "$output"
              echo "$output" | grep -q "already completed" || exit 1
            }
          when: on_fail

workflows:
  data-prep-workflow:
    jobs:
      - data-prep

version: 2.1
jobs:
  data-prep:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Data Prep
          command: |
            echo "Running data prep..."
            sleep 5
            echo "Data prep done"

  forecasting:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Forecasting
          command: |
            echo "Running forecasting..."
            sleep 5
            echo "Forecasting done"

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Deploy
          command: |
            echo "Deploying..."
            sleep 3
            echo "Deploy complete"

workflows:
  main:
    jobs:
      - data-prep
      - forecasting
      - 5-year-prediction
      - reporting
      - long-Term-Data-Archive
      - deploy
